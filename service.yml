apiVersion: v1
kind: Service
metadata:
  name: observer-service
spec:
  type: NodePort
  selector:
    app: observer # Matches the label on your web application pods
  ports:
    - port: 80      # The port the service exposes internally inside the cluster
      targetPort: 5000  # The actual port your application container is listening on
      nodePort: 32000 # The external port you will use to access it from outside
